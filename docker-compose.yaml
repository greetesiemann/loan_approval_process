services:
  db:
    image: postgres:15
    container_name: loan-db
    environment:
      POSTGRES_DB: loan_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: Siemann
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d loan_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: loan-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/loan_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=Siemann
    depends_on:
      db:
        condition: service_healthy